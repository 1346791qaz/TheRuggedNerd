<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="axeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00E676;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A5D6A7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Axe icon -->
  <g transform="translate(6, 8)" filter="url(#glow)">
    <!-- Axe handle -->
    <line x1="22" y1="36" x2="10" y2="10" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>
    <!-- Axe head -->
    <path d="M18 14 Q30 4 36 10 Q40 18 30 22 Z" fill="url(#axeGrad)" stroke="#2E7D32" stroke-width="0.5"/>
    <!-- Circuit lines on axe head -->
    <line x1="24" y1="14" x2="32" y2="16" stroke="#001" stroke-width="0.8" opacity="0.4"/>
    <circle cx="32" cy="16" r="1.2" fill="#001" opacity="0.4"/>
    <line x1="26" y1="17" x2="30" y2="19" stroke="#001" stroke-width="0.8" opacity="0.4"/>
    <!-- Bit glow -->
    <path d="M18 14 Q30 4 36 10 Q40 18 30 22 Z" fill="none" stroke="#69F0AE" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Circuit dot accent -->
  <circle cx="48" cy="30" r="2.5" fill="#00E676" opacity="0.8" filter="url(#glow)"/>

  <!-- THE RUGGED NERD text -->
  <text x="56" y="24" font-family="'Rajdhani', 'Arial Narrow', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="url(#textGrad)" filter="url(#glow)">THE RUGGED</text>
  <text x="56" y="42" font-family="'Rajdhani', 'Arial Narrow', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2" fill="url(#axeGrad)" filter="url(#glow)">NERD</text>

  <!-- Decorative circuit line -->
  <line x1="56" y1="46" x2="158" y2="46" stroke="#2E7D32" stroke-width="0.8" opacity="0.6"/>
  <circle cx="158" cy="46" r="2" fill="#00E676" opacity="0.7"/>
</svg>
